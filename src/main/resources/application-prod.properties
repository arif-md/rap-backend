# ============================================================================
# Prod Profile Configuration — deployed to the 'prod' Azure environment
# ============================================================================
# Loaded when SPRING_PROFILES_ACTIVE=prod.
# TODO: Replace all placeholder values with production-specific values before
#       deploying to production.
# ============================================================================

server.forward-headers-strategy=native
server.servlet.session.cookie.secure=true
spring.cloud.azure.appconfiguration.enabled=true

# ===========================================================================
# OIDC Provider — Login.gov PRODUCTION
# TODO: Replace client-id with the production Login.gov client ID
# ===========================================================================
spring.security.oauth2.client.provider.oidc-provider.authorization-uri=https://secure.login.gov/openid_connect/authorize
spring.security.oauth2.client.provider.oidc-provider.token-uri=https://secure.login.gov/api/openid_connect/token
spring.security.oauth2.client.provider.oidc-provider.user-info-uri=https://secure.login.gov/api/openid_connect/userinfo
spring.security.oauth2.client.provider.oidc-provider.jwk-set-uri=https://secure.login.gov/api/openid_connect/certs
spring.security.oauth2.client.provider.oidc-provider.end-session-endpoint=https://secure.login.gov/openid_connect/logout
spring.security.oauth2.client.provider.oidc-provider.user-name-attribute=preferred_username

spring.security.oauth2.client.registration.oidc-provider.provider=oidc-provider
# TODO: Replace with production Login.gov client ID
spring.security.oauth2.client.registration.oidc-provider.client-id=REPLACE_WITH_PROD_LOGIN_GOV_CLIENT_ID
spring.security.oauth2.client.registration.oidc-provider.client-authentication-method=none
spring.security.oauth2.client.registration.oidc-provider.scope=openid,profile,email
spring.security.oauth2.client.registration.oidc-provider.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.oidc-provider.client-name=Raptor OIDC Provider
spring.security.oauth2.client.registration.oidc-provider.authorization-grant-type=authorization_code

oidc.logout.include-id-token-hint=false
oidc.addl.req.param.acr.values=http://idmanagement.gov/ns/assurance/ial/1
oidc.addl.req.param.prompt=select_account
oidc.addl.req.param.response.type=code

# ===========================================================================
# Azure AD / Entra ID — internal users (SSO)
# TODO: Update tenant-id and client-id for the production app registration
# ===========================================================================
spring.security.oauth2.client.provider.azure-ad.authorization-uri=https://login.microsoftonline.com/REPLACE_WITH_PROD_TENANT_ID/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure-ad.token-uri=https://login.microsoftonline.com/REPLACE_WITH_PROD_TENANT_ID/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure-ad.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.azure-ad.jwk-set-uri=https://login.microsoftonline.com/REPLACE_WITH_PROD_TENANT_ID/discovery/v2.0/keys
spring.security.oauth2.client.provider.azure-ad.user-name-attribute=preferred_username

spring.security.oauth2.client.registration.azure-ad.provider=azure-ad
# TODO: Replace with production AAD app registration client-id
spring.security.oauth2.client.registration.azure-ad.client-id=REPLACE_WITH_PROD_AAD_CLIENT_ID
spring.security.oauth2.client.registration.azure-ad.client-secret=${AZURE_AD_CLIENT_SECRET:}
spring.security.oauth2.client.registration.azure-ad.scope=openid,profile,email
spring.security.oauth2.client.registration.azure-ad.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.azure-ad.client-name=Azure Entra ID (SSO)
spring.security.oauth2.client.registration.azure-ad.authorization-grant-type=authorization_code

# TODO: Replace with production tenant ID
app.azure-ad.end-session-endpoint=https://login.microsoftonline.com/REPLACE_WITH_PROD_TENANT_ID/oauth2/v2.0/logout
