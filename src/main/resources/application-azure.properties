# ============================================================================
# Azure Production Profile Configuration
# ============================================================================
# This file is loaded when running with SPRING_PROFILES_ACTIVE=azure
# 
# IMPORTANT PRECEDENCE RULES:
# 1. Profile-specific properties (THIS FILE) - HIGHEST PRIORITY for files
# 2. OS environment variables (from Azure Container App env vars)
# 3. Default properties (application.properties)
# 
# This means values in THIS FILE override environment variables!
# 
# Usage:
#   - Set SPRING_PROFILES_ACTIVE=azure in Azure Container App environment
#   - Automatically activated via Dockerfile CMD
# 
# See: docs/CONFIGURATION-MANAGEMENT.md for complete configuration guide
# ============================================================================

# ===========================================================================
# Azure Entra ID SSO (Internal Users — Primary Auth Provider)
# ===========================================================================
# Azure AD provides SSO for internal staff using organizational accounts.
# App registration must be configured in Azure Entra ID:
# 1. Register app in Azure Portal → Entra ID → App registrations
# 2. Set redirect URI: {backendFqdn}/login/oauth2/code/azure-ad
# 3. Configure ID token claims (optional: groups, app roles)
# 4. Set AZURE_AD_TENANT_ID, AZURE_AD_CLIENT_ID, AZURE_AD_CLIENT_SECRET as
#    Container App environment variables (stored in Key Vault recommended).
# ===========================================================================
#spring.security.oauth2.client.provider.azure-ad.authorization-uri=https://login.microsoftonline.com/${AZURE_AD_TENANT_ID}/oauth2/v2.0/authorize
#spring.security.oauth2.client.provider.azure-ad.token-uri=https://login.microsoftonline.com/${AZURE_AD_TENANT_ID}/oauth2/v2.0/token
#spring.security.oauth2.client.provider.azure-ad.jwk-set-uri=https://login.microsoftonline.com/${AZURE_AD_TENANT_ID}/discovery/v2.0/keys
#spring.security.oauth2.client.provider.azure-ad.user-info-uri=https://graph.microsoft.com/oidc/userinfo
#spring.security.oauth2.client.provider.azure-ad.user-name-attribute=preferred_username

#spring.security.oauth2.client.registration.azure-ad.provider=azure-ad
#spring.security.oauth2.client.registration.azure-ad.client-id=${AZURE_AD_CLIENT_ID}
#spring.security.oauth2.client.registration.azure-ad.client-secret=${AZURE_AD_CLIENT_SECRET}
#spring.security.oauth2.client.registration.azure-ad.scope=openid,profile,email
#spring.security.oauth2.client.registration.azure-ad.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
#spring.security.oauth2.client.registration.azure-ad.client-name=Azure Entra ID (SSO)
#spring.security.oauth2.client.registration.azure-ad.authorization-grant-type=authorization_code


# Azure AD end-session endpoint: empty means use Microsoft's default logout URL
#app.azure-ad.end-session-endpoint=

# ===========================================================================
# Reverse Proxy / TLS Termination Configuration
# ===========================================================================
# Azure Container Apps terminates TLS at the ingress proxy and forwards HTTP
# requests to the backend with X-Forwarded-Proto / X-Forwarded-Host headers.
# Without this setting, Spring Security resolves {baseUrl} as http:// instead
# of https://, causing redirect_uri mismatches with OAuth2 providers.
# "native" enables Tomcat's RemoteIpValve, which is lightweight and sufficient.
server.forward-headers-strategy=native

# ===========================================================================
# Session Cookie Security
# ===========================================================================
# Must be Secure in Azure — the OAuth2 authorization flow stores a nonce in
# the HTTP session. If the session cookie isn't Secure, it may not be sent
# back on the HTTPS callback redirect, causing nonce validation failures.
server.servlet.session.cookie.secure=true

# ===========================================================================
# Azure App Configuration — Centralized Non-Secret Configuration
# ===========================================================================
# Connects to Azure App Configuration at startup to load all OIDC, AAD, JWT,
# CORS, and frontend URL settings. Secrets (jwt-secret, aad-client-secret)
# remain in Key Vault via Container App secretRef.
#
# Authentication uses the user-assigned managed identity whose client ID is
# set as AZURE_CLIENT_ID on the Container App.
#
# Spring Cloud Azure App Configuration 5.x uses the Spring Cloud Bootstrap
# mechanism (BootstrapConfiguration in spring.factories), activated by the
# spring-cloud-starter-bootstrap dependency. Properties are loaded early
# in the application lifecycle via AppConfigurationPropertySourceLocator.
# ===========================================================================
spring.cloud.azure.appconfiguration.enabled=true
spring.cloud.azure.appconfiguration.stores[0].endpoint=${APP_CONFIG_ENDPOINT:}
spring.cloud.azure.appconfiguration.stores[0].monitoring.enabled=false

# Use user-assigned managed identity for App Config authentication
spring.cloud.azure.credential.managed-identity-enabled=true
spring.cloud.azure.credential.client-id=${AZURE_CLIENT_ID:}
