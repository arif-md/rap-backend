# ============================================================================
# Docker Compose Profile Configuration
# ============================================================================
# This file is loaded when running with SPRING_PROFILES_ACTIVE=docker
# Used by: docker-compose.yml backend service
# 
# Key difference from local profile:
# - Backend runs inside a Docker container
# - Browser endpoints use localhost (user's browser)
# - Server-to-server endpoints use host.docker.internal (container networking)
# 
# See: docs/CONFIGURATION-MANAGEMENT.md for complete configuration guide
# ============================================================================

# ===========================================================================
# OIDC Provider: Keycloak (External Users)
# ===========================================================================
# Docker Compose passes env vars: OIDC_AUTHORIZATION_URI, OIDC_TOKEN_URI, etc.
# Browser-facing endpoints: localhost:9090
# Backend-facing endpoints: host.docker.internal:9090
# ===========================================================================
spring.security.oauth2.client.provider.oidc-provider.authorization-uri=${OIDC_AUTHORIZATION_URI:http://localhost:9090/realms/raptor/protocol/openid-connect/auth}
spring.security.oauth2.client.provider.oidc-provider.token-uri=${OIDC_TOKEN_URI:http://host.docker.internal:9090/realms/raptor/protocol/openid-connect/token}
spring.security.oauth2.client.provider.oidc-provider.user-info-uri=${OIDC_USER_INFO_URI:http://host.docker.internal:9090/realms/raptor/protocol/openid-connect/userinfo}
spring.security.oauth2.client.provider.oidc-provider.jwk-set-uri=${OIDC_JWK_SET_URI:http://host.docker.internal:9090/realms/raptor/protocol/openid-connect/certs}
spring.security.oauth2.client.provider.oidc-provider.end-session-endpoint=${OIDC_END_SESSION_ENDPOINT:http://localhost:9090/realms/raptor/protocol/openid-connect/logout}
spring.security.oauth2.client.provider.oidc-provider.user-name-attribute=preferred_username

spring.security.oauth2.client.registration.oidc-provider.provider=oidc-provider
spring.security.oauth2.client.registration.oidc-provider.client-id=${OIDC_CLIENT_ID:raptor-client}
spring.security.oauth2.client.registration.oidc-provider.client-authentication-method=none
spring.security.oauth2.client.registration.oidc-provider.scope=openid,profile,email
spring.security.oauth2.client.registration.oidc-provider.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.oidc-provider.client-name=Raptor OIDC Provider
spring.security.oauth2.client.registration.oidc-provider.authorization-grant-type=authorization_code

# ===========================================================================
# Keycloak Internal User Login (Offline Fallback)
# ===========================================================================
spring.security.oauth2.client.registration.keycloak-internal.provider=oidc-provider
spring.security.oauth2.client.registration.keycloak-internal.client-id=${OIDC_CLIENT_ID:raptor-client}
spring.security.oauth2.client.registration.keycloak-internal.client-authentication-method=none
spring.security.oauth2.client.registration.keycloak-internal.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak-internal.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.keycloak-internal.client-name=Keycloak Internal User
spring.security.oauth2.client.registration.keycloak-internal.authorization-grant-type=authorization_code

# ===========================================================================
# Azure Entra ID SSO (Internal Users — Optional for Docker dev)
# ===========================================================================
# Set AZURE_AD_TENANT_ID, AZURE_AD_CLIENT_ID, AZURE_AD_CLIENT_SECRET in .env
# to enable Azure AD SSO in Docker Compose environment.
# ===========================================================================
spring.security.oauth2.client.provider.azure-ad.authorization-uri=https://login.microsoftonline.com/${AZURE_AD_TENANT_ID:common}/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure-ad.token-uri=https://login.microsoftonline.com/${AZURE_AD_TENANT_ID:common}/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure-ad.jwk-set-uri=https://login.microsoftonline.com/${AZURE_AD_TENANT_ID:common}/discovery/v2.0/keys
spring.security.oauth2.client.provider.azure-ad.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.azure-ad.user-name-attribute=preferred_username

spring.security.oauth2.client.registration.azure-ad.provider=azure-ad
spring.security.oauth2.client.registration.azure-ad.client-id=${AZURE_AD_CLIENT_ID:not-configured}
spring.security.oauth2.client.registration.azure-ad.client-secret=${AZURE_AD_CLIENT_SECRET:not-configured}
spring.security.oauth2.client.registration.azure-ad.scope=openid,profile,email
spring.security.oauth2.client.registration.azure-ad.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.azure-ad.client-name=Azure Entra ID (SSO)
spring.security.oauth2.client.registration.azure-ad.authorization-grant-type=authorization_code
