# ============================================================================
# Dev Profile Configuration — deployed to the 'dev' Azure environment
# ============================================================================
# Loaded when SPRING_PROFILES_ACTIVE=dev (set by infra/app/backend-springboot.bicep).
#
# OIDC/AAD non-secret values are hardcoded for dev.
# Secrets (jwt.secret, azure-ad client-secret) are injected at startup via
# Azure App Configuration Key Vault references — no env vars, no secretRefs.
# See: docs/APPLICATION-CONFIG.md for the full architecture.
# ============================================================================

# ===========================================================================
# Reverse Proxy / TLS Termination
# ===========================================================================
# Azure Container Apps terminates TLS at the ingress proxy. "native" enables
# Tomcat's RemoteIpValve so {baseUrl} resolves to https:// in OAuth2 redirect URIs.
server.forward-headers-strategy=native

# Session cookie must be Secure in Azure — the OAuth2 nonce is stored in the
# HTTP session; without this flag the cookie isn't sent on the HTTPS callback.
server.servlet.session.cookie.secure=true

# ===========================================================================
# Azure App Configuration — must be re-enabled here
# ===========================================================================
# application.properties disables App Config (for local dev without an endpoint).
# Profile-specific properties take precedence over application.properties, so
# this re-enables App Config for the dev profile.
spring.cloud.azure.appconfiguration.enabled=true

# ===========================================================================
# OIDC Provider — Login.gov INT sandbox (external / public users)
# ===========================================================================
spring.security.oauth2.client.provider.oidc-provider.authorization-uri=https://idp.int.identitysandbox.gov/openid_connect/authorize
spring.security.oauth2.client.provider.oidc-provider.token-uri=https://idp.int.identitysandbox.gov/api/openid_connect/token
spring.security.oauth2.client.provider.oidc-provider.user-info-uri=https://idp.int.identitysandbox.gov/api/openid_connect/userinfo
spring.security.oauth2.client.provider.oidc-provider.jwk-set-uri=https://idp.int.identitysandbox.gov/api/openid_connect/certs
spring.security.oauth2.client.provider.oidc-provider.end-session-endpoint=https://idp.int.identitysandbox.gov/openid_connect/logout
spring.security.oauth2.client.provider.oidc-provider.user-name-attribute=preferred_username

spring.security.oauth2.client.registration.oidc-provider.provider=oidc-provider
spring.security.oauth2.client.registration.oidc-provider.client-id=urn:gov:gsa:openidconnect.profiles:sp:sso:doi:RAPTOR-Containerization
# Login.gov uses PKCE — public client, no client secret
spring.security.oauth2.client.registration.oidc-provider.client-authentication-method=none
spring.security.oauth2.client.registration.oidc-provider.scope=openid,profile,email
spring.security.oauth2.client.registration.oidc-provider.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.oidc-provider.client-name=Raptor OIDC Provider
spring.security.oauth2.client.registration.oidc-provider.authorization-grant-type=authorization_code

# Login.gov: do NOT include id_token_hint on logout (provider rejects it)
oidc.logout.include-id-token-hint=false

# Login.gov additional request parameters (sent on every authorization request)
oidc.addl.req.param.acr.values=http://idmanagement.gov/ns/assurance/ial/1
oidc.addl.req.param.prompt=select_account
oidc.addl.req.param.response.type=code

# ===========================================================================
# Azure AD / Entra ID — internal users (SSO)
# Tenant: DOI tenant (60a52712-6791-451d-bdec-5021c5f60a64)
# ===========================================================================
spring.security.oauth2.client.provider.azure-ad.authorization-uri=https://login.microsoftonline.com/60a52712-6791-451d-bdec-5021c5f60a64/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure-ad.token-uri=https://login.microsoftonline.com/60a52712-6791-451d-bdec-5021c5f60a64/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure-ad.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.azure-ad.jwk-set-uri=https://login.microsoftonline.com/60a52712-6791-451d-bdec-5021c5f60a64/discovery/v2.0/keys
spring.security.oauth2.client.provider.azure-ad.user-name-attribute=preferred_username

spring.security.oauth2.client.registration.azure-ad.provider=azure-ad
spring.security.oauth2.client.registration.azure-ad.client-id=8e2bc82f-76db-43ba-b07e-2dc5f4a5769f
# AAD client secret is injected via App Config Key Vault reference at startup
# (app:spring.security.oauth2.client.registration.azure-ad.client-secret → KV:aad-client-secret).
# Empty default here prevents PlaceholderResolutionException if App Config is unreachable.
spring.security.oauth2.client.registration.azure-ad.client-secret=${AZURE_AD_CLIENT_SECRET:}
spring.security.oauth2.client.registration.azure-ad.scope=openid,profile,email
spring.security.oauth2.client.registration.azure-ad.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.azure-ad.client-name=Azure Entra ID (SSO)
spring.security.oauth2.client.registration.azure-ad.authorization-grant-type=authorization_code

# AAD end-session endpoint (used by AuthController for logout redirect)
app.azure-ad.end-session-endpoint=https://login.microsoftonline.com/60a52712-6791-451d-bdec-5021c5f60a64/oauth2/v2.0/logout
