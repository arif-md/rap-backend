# ============================================================================
# Spring Cloud Bootstrap — Base Configuration
# ============================================================================
# The bootstrap phase runs BEFORE the main application context. Spring Cloud
# Azure App Configuration uses this phase to fetch external properties.
#
# Disabled by default so local development (which has no App Config endpoint)
# doesn't fail. Enabled in bootstrap-azure.properties when the azure profile
# is active.
# ============================================================================
spring.cloud.azure.appconfiguration.enabled=false
