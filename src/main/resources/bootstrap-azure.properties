# ============================================================================
# Spring Cloud Bootstrap — Azure Profile Configuration
# ============================================================================
# Loaded during the bootstrap phase when SPRING_PROFILES_ACTIVE=azure.
#
# Spring Cloud Azure App Configuration 5.x uses the Spring Cloud Bootstrap
# mechanism (BootstrapConfiguration in spring.factories) to connect to Azure
# App Configuration BEFORE the main application context starts. Properties
# fetched here become available to all beans during normal startup.
#
# The spring-cloud-starter-bootstrap dependency activates this mechanism.
# Without it, the BootstrapConfiguration entry in spring.factories is ignored
# and App Configuration properties are never loaded.
# ============================================================================

# Enable App Configuration (overrides bootstrap.properties default of false)
spring.cloud.azure.appconfiguration.enabled=true

# App Configuration store endpoint (set as env var on Azure Container App)
spring.cloud.azure.appconfiguration.stores[0].endpoint=${APP_CONFIG_ENDPOINT:}
spring.cloud.azure.appconfiguration.stores[0].monitoring.enabled=true
spring.cloud.azure.appconfiguration.stores[0].monitoring.refresh-interval=30s
spring.cloud.azure.appconfiguration.stores[0].monitoring.triggers[0].key=app:sentinel
spring.cloud.azure.appconfiguration.stores[0].monitoring.triggers[0].label=azure

# Key/Label strategy:
#   key-filter: 'app:' prefix avoids slashes (which break ARM resource names)
#   and avoids '*' (which the library rejects). The library appends '*' internally
#   so it queries 'app:*' and strips the 'app:' prefix from loaded keys.
#   label-filter: not set → defaults to active Spring profile names (azure).
# Example: key 'app:jwt.issuer' with label 'azure' → Spring property 'jwt.issuer'
spring.cloud.azure.appconfiguration.stores[0].selects[0].key-filter=app:

# Authenticate using the user-assigned managed identity
spring.cloud.azure.credential.managed-identity-enabled=true
spring.cloud.azure.credential.client-id=${AZURE_CLIENT_ID:}
