# ============================================================================
# Spring Cloud Bootstrap — dev profile
# ============================================================================
# Loaded during the bootstrap phase when SPRING_PROFILES_ACTIVE=dev.
# Connects to the dev Azure App Configuration store BEFORE the main
# application context starts, so all App Config properties are available
# at bean initialization time.
# ============================================================================

# Enable App Configuration (overrides bootstrap.properties default of false)
spring.cloud.azure.appconfiguration.enabled=true

# App Configuration store endpoint (injected as env var by backend-springboot.bicep)
spring.cloud.azure.appconfiguration.stores[0].endpoint=${APP_CONFIG_ENDPOINT:}

# Sentinel-based refresh — Spring polls this key every 30s and reloads all
# App Config properties when the sentinel value changes.
spring.cloud.azure.appconfiguration.stores[0].monitoring.enabled=true
spring.cloud.azure.appconfiguration.stores[0].monitoring.refresh-interval=30s
spring.cloud.azure.appconfiguration.stores[0].monitoring.triggers[0].key=app:sentinel
spring.cloud.azure.appconfiguration.stores[0].monitoring.triggers[0].label=dev

# Key/Label strategy:
#   key-filter 'app:' — all entries use this prefix to avoid slashes in ARM names.
#     The library strips the prefix, so 'app:jwt.issuer' → Spring property 'jwt.issuer'.
#   label-filter 'dev' — only load entries labeled 'dev' (written by Bicep with
#     environmentName as the label). Without this, the library loads null-label entries
#     and finds nothing.
spring.cloud.azure.appconfiguration.stores[0].selects[0].key-filter=app:
spring.cloud.azure.appconfiguration.stores[0].selects[0].label-filter=dev

# Authenticate using the user-assigned managed identity (client-id injected by Bicep)
spring.cloud.azure.credential.managed-identity-enabled=true
spring.cloud.azure.credential.client-id=${AZURE_CLIENT_ID:}
