# ============================================================================
# Local Development Profile Configuration
# ============================================================================
# This file is loaded when running with SPRING_PROFILES_ACTIVE=local
# 
# IMPORTANT PRECEDENCE RULES:
# 1. Profile-specific properties (THIS FILE) - HIGHEST PRIORITY for files
# 2. OS environment variables (from .env via run-local.ps1)
# 3. Default properties (application.properties)
# 
# This means values in THIS FILE override environment variables!
# 
# Usage:
#   - Set SPRING_PROFILES_ACTIVE=local in backend/.env
#   - Run via: .\run-local.ps1
# 
# See: docs/CONFIGURATION-MANAGEMENT.md for complete configuration guide
# ============================================================================

# Override JWT timeout for local development (shorter for easier testing)
jwt.access-token-expiration-minutes=60
jwt.refresh-token-expiration-days=1

# ===========================================================================
# OIDC Provider: Keycloak (External Users)
# ===========================================================================
# Local Keycloak runs on port 9090 via Docker Compose.
# Browser uses localhost:9090; backend uses host.docker.internal:9090 when
# running in Docker, or localhost:9090 when running via mvnw/IDE.
# We specify all endpoints explicitly (no auto-discovery) to handle
# Docker networking correctly.
# ===========================================================================
spring.security.oauth2.client.provider.oidc-provider.authorization-uri=${OIDC_AUTHORIZATION_ENDPOINT:http://localhost:9090/realms/raptor/protocol/openid-connect/auth}
spring.security.oauth2.client.provider.oidc-provider.token-uri=${OIDC_TOKEN_ENDPOINT:http://localhost:9090/realms/raptor/protocol/openid-connect/token}
spring.security.oauth2.client.provider.oidc-provider.user-info-uri=${OIDC_USER_INFO_ENDPOINT:http://localhost:9090/realms/raptor/protocol/openid-connect/userinfo}
spring.security.oauth2.client.provider.oidc-provider.jwk-set-uri=${OIDC_JWK_SET_URI:http://localhost:9090/realms/raptor/protocol/openid-connect/certs}
spring.security.oauth2.client.provider.oidc-provider.end-session-endpoint=${OIDC_END_SESSION_ENDPOINT:http://localhost:9090/realms/raptor/protocol/openid-connect/logout}
spring.security.oauth2.client.provider.oidc-provider.user-name-attribute=preferred_username

spring.security.oauth2.client.registration.oidc-provider.provider=oidc-provider
spring.security.oauth2.client.registration.oidc-provider.client-id=${OIDC_CLIENT_ID:raptor-client}
spring.security.oauth2.client.registration.oidc-provider.client-authentication-method=none
spring.security.oauth2.client.registration.oidc-provider.scope=openid,profile,email
spring.security.oauth2.client.registration.oidc-provider.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.oidc-provider.client-name=Raptor OIDC Provider
spring.security.oauth2.client.registration.oidc-provider.authorization-grant-type=authorization_code

# ===========================================================================
# Azure AD / Internal User Login (Keycloak in local dev)
# ===========================================================================
# In local development, the azure-ad registration points to the SAME Keycloak
# as oidc-provider, allowing internal user testing without Azure AD.
# In production (azure profile), these point to real Azure Entra ID.
# Roles come from Keycloak token claims (realm_access.roles).
# ===========================================================================
spring.security.oauth2.client.provider.azure-ad.authorization-uri=${AZURE_AD_AUTHORIZATION_URI:http://localhost:9090/realms/raptor/protocol/openid-connect/auth}
spring.security.oauth2.client.provider.azure-ad.token-uri=${AZURE_AD_TOKEN_URI:http://localhost:9090/realms/raptor/protocol/openid-connect/token}
spring.security.oauth2.client.provider.azure-ad.jwk-set-uri=${AZURE_AD_JWK_SET_URI:http://localhost:9090/realms/raptor/protocol/openid-connect/certs}
spring.security.oauth2.client.provider.azure-ad.user-info-uri=${AZURE_AD_USER_INFO_URI:http://localhost:9090/realms/raptor/protocol/openid-connect/userinfo}
spring.security.oauth2.client.provider.azure-ad.user-name-attribute=preferred_username

spring.security.oauth2.client.registration.azure-ad.provider=azure-ad
spring.security.oauth2.client.registration.azure-ad.client-id=${AZURE_AD_CLIENT_ID:raptor-client}
spring.security.oauth2.client.registration.azure-ad.client-authentication-method=none
spring.security.oauth2.client.registration.azure-ad.scope=openid,profile,email
spring.security.oauth2.client.registration.azure-ad.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.azure-ad.client-name=Internal User Login
spring.security.oauth2.client.registration.azure-ad.authorization-grant-type=authorization_code

# Azure AD end-session endpoint for logout (Keycloak in local dev)
app.azure-ad.end-session-endpoint=${AZURE_AD_END_SESSION_ENDPOINT:http://localhost:9090/realms/raptor/protocol/openid-connect/logout}
